<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 620" font-family="Segoe UI, Arial, sans-serif">
  <rect width="700" height="620" fill="#f8f9fa"/>

  <text x="350" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1565c0">Diagrama de Arquitectura - 3 Capas</text>

  <!-- Capa 1 - Presentacion -->
  <rect x="50" y="55" width="600" height="130" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="350" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">Capa 1 - Presentacion (interfaz.py)</text>

  <rect x="70" y="95" width="170" height="75" rx="8" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
  <text x="155" y="118" text-anchor="middle" font-size="11" font-weight="bold">Pestana Generar</text>
  <text x="155" y="135" text-anchor="middle" font-size="9">Slider, checkboxes</text>
  <text x="155" y="150" text-anchor="middle" font-size="9">Barra de fortaleza</text>
  <text x="155" y="165" text-anchor="middle" font-size="9">Boton Copiar</text>

  <rect x="265" y="95" width="170" height="75" rx="8" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
  <text x="350" y="118" text-anchor="middle" font-size="11" font-weight="bold">Pestana Passphrase</text>
  <text x="350" y="135" text-anchor="middle" font-size="9">Selector cantidad</text>
  <text x="350" y="150" text-anchor="middle" font-size="9">Boton generar</text>
  <text x="350" y="165" text-anchor="middle" font-size="9">Resultado + entropia</text>

  <rect x="460" y="95" width="170" height="75" rx="8" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
  <text x="545" y="118" text-anchor="middle" font-size="11" font-weight="bold">Pestana Analizar</text>
  <text x="545" y="135" text-anchor="middle" font-size="9">Campo de entrada</text>
  <text x="545" y="150" text-anchor="middle" font-size="9">Boton analizar</text>
  <text x="545" y="165" text-anchor="middle" font-size="9">Resultados texto</text>

  <!-- Flecha hacia abajo -->
  <line x1="350" y1="185" x2="350" y2="225" stroke="#333" stroke-width="2"/>
  <polygon points="345,220 350,230 355,220" fill="#333"/>

  <!-- Capa 2 - Logica -->
  <rect x="50" y="235" width="600" height="160" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="350" y="260" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Capa 2 - Logica de Negocio (core.py)</text>

  <rect x="70" y="280" width="170" height="100" rx="8" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="155" y="303" text-anchor="middle" font-size="11" font-weight="bold">generar()</text>
  <text x="155" y="320" text-anchor="middle" font-size="9">Seleccion aleatoria</text>
  <text x="155" y="335" text-anchor="middle" font-size="9">Garantia 1 por tipo</text>
  <text x="155" y="350" text-anchor="middle" font-size="9">Fisher-Yates shuffle</text>
  <text x="155" y="365" text-anchor="middle" font-size="9">secrets.choice()</text>

  <rect x="265" y="280" width="170" height="100" rx="8" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="350" y="303" text-anchor="middle" font-size="11" font-weight="bold">generar_passphrase()</text>
  <text x="350" y="320" text-anchor="middle" font-size="9">secrets.sample()</text>
  <text x="350" y="335" text-anchor="middle" font-size="9">130+ palabras</text>
  <text x="350" y="350" text-anchor="middle" font-size="9">Union con guiones</text>
  <text x="350" y="365" text-anchor="middle" font-size="9">Entropia estimada</text>

  <rect x="460" y="280" width="170" height="100" rx="8" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="545" y="303" text-anchor="middle" font-size="11" font-weight="bold">analizar_contrasena()</text>
  <text x="545" y="320" text-anchor="middle" font-size="9">calcular_entropia()</text>
  <text x="545" y="335" text-anchor="middle" font-size="9">calcular_fortaleza()</text>
  <text x="545" y="350" text-anchor="middle" font-size="9">Detectar patrones</text>
  <text x="545" y="365" text-anchor="middle" font-size="9">Tiempo de ruptura</text>

  <!-- Flecha hacia abajo -->
  <line x1="350" y1="395" x2="350" y2="435" stroke="#333" stroke-width="2"/>
  <polygon points="345,430 350,440 355,430" fill="#333"/>

  <!-- Capa 3 - Datos -->
  <rect x="50" y="445" width="600" height="80" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="350" y="470" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Capa 3 - Datos y Constantes (core.py)</text>

  <rect x="70" y="485" width="130" height="30" rx="5" fill="#ffe0b2" stroke="#e65100" stroke-width="1"/>
  <text x="135" y="504" text-anchor="middle" font-size="10">MAYUS, MINUS</text>

  <rect x="220" y="485" width="80" height="30" rx="5" fill="#ffe0b2" stroke="#e65100" stroke-width="1"/>
  <text x="260" y="504" text-anchor="middle" font-size="10">NUMEROS</text>

  <rect x="320" y="485" width="80" height="30" rx="5" fill="#ffe0b2" stroke="#e65100" stroke-width="1"/>
  <text x="360" y="504" text-anchor="middle" font-size="10">SIMBOLOS</text>

  <rect x="420" y="485" width="100" height="30" rx="5" fill="#ffe0b2" stroke="#e65100" stroke-width="1"/>
  <text x="470" y="504" text-anchor="middle" font-size="10">PALABRAS</text>

  <rect x="540" y="485" width="90" height="30" rx="5" fill="#ffe0b2" stroke="#e65100" stroke-width="1"/>
  <text x="585" y="504" text-anchor="middle" font-size="10">math, secrets</text>

  <!-- Capa extra - main.py -->
  <rect x="220" y="555" width="260" height="40" rx="10" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="350" y="580" text-anchor="middle" font-size="12" font-weight="bold" fill="#6a1b9a">Punto de Entrada: main.py</text>
  <text x="350" y="592" text-anchor="middle" font-size="9">Crea ventana y ejecuta mainloop()</text>

  <line x1="350" y1="525" x2="350" y2="555" stroke="#333" stroke-width="2"/>
  <polygon points="345,550 350,560 355,550" fill="#333"/>
</svg>