<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Segoe UI, Arial, sans-serif">
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Titulo -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">Diagrama de Casos de Uso - Generador Seguro de Contrasenas</text>

  <!-- Sistema -->
  <rect x="250" y="55" width="300" height="520" rx="10" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="400" y="80" text-anchor="middle" font-size="14" font-weight="bold">Generador Seguro</text>
  <text x="400" y="97" text-anchor="middle" font-size="12" fill="#666">de Contrasenas</text>

  <!-- Actor: Usuario -->
  <ellipse cx="80" cy="180" rx="35" ry="25" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="80" y="185" text-anchor="middle" font-size="12" font-weight="bold">Usuario</text>

  <!-- Actor: Sistema -->
  <ellipse cx="720" cy="180" rx="35" ry="25" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="720" y="185" text-anchor="middle" font-size="12" font-weight="bold">Sistema</text>

  <!-- Casos de uso -->
  <ellipse cx="400" cy="150" rx="120" ry="22" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="400" y="155" text-anchor="middle" font-size="11">Generar Contrasena</text>

  <ellipse cx="400" cy="210" rx="110" ry="22" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="400" y="215" text-anchor="middle" font-size="11">Generar Passphrase</text>

  <ellipse cx="400" cy="270" rx="110" ry="22" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="400" y="275" text-anchor="middle" font-size="11">Analizar Contrasena</text>

  <ellipse cx="400" cy="330" rx="120" ry="22" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="400" y="335" text-anchor="middle" font-size="11">Copiar al Portapapeles</text>

  <ellipse cx="400" cy="390" rx="110" ry="22" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="400" y="395" text-anchor="middle" font-size="11">Configurar Parametros</text>

  <ellipse cx="400" cy="450" rx="120" ry="22" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="400" y="455" text-anchor="middle" font-size="11">Visualizar Entropia</text>

  <!-- Lineas actor-usuario -->
  <line x1="115" y1="180" x2="280" y2="150" stroke="#333" stroke-width="1.5"/>
  <line x1="115" y1="180" x2="290" y2="210" stroke="#333" stroke-width="1.5"/>
  <line x1="115" y1="180" x2="290" y2="270" stroke="#333" stroke-width="1.5"/>
  <line x1="115" y1="180" x2="280" y2="330" stroke="#333" stroke-width="1.5"/>
  <line x1="115" y1="180" x2="290" y2="390" stroke="#333" stroke-width="1.5"/>
  <line x1="115" y1="180" x2="280" y2="450" stroke="#333" stroke-width="1.5"/>

  <!-- Lineas actor-sistema -->
  <line x1="685" y1="180" x2="520" y2="150" stroke="#333" stroke-width="1.5"/>
  <line x1="685" y1="180" x2="510" y2="210" stroke="#333" stroke-width="1.5"/>
  <line x1="685" y1="180" x2="510" y2="270" stroke="#333" stroke-width="1.5"/>
  <line x1="685" y1="180" x2="520" y2="330" stroke="#333" stroke-width="1.5"/>
  <line x1="685" y1="180" x2="510" y2="390" stroke="#333" stroke-width="1.5"/>
  <line x1="685" y1="180" x2="520" y2="450" stroke="#333" stroke-width="1.5"/>
</svg>